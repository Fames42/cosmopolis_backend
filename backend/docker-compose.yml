services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cosmopolis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cosmopolis_dev}
      POSTGRES_DB: cosmopolis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmopolis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://cosmopolis:${POSTGRES_PASSWORD:-cosmopolis_dev}@db:5432/cosmopolis
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
    depends_on:
      db:
        condition: service_healthy

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: cosmopolis
      PGPASSWORD: ${POSTGRES_PASSWORD:-cosmopolis_dev}
      PGDATABASE: cosmopolis
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          FILENAME="/backups/cosmopolis_$$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
          echo "[backup] $$(date) — starting dump..."
          pg_dump | gzip > "$$FILENAME"
          echo "[backup] saved $$FILENAME"
          # keep only last 7 backups
          ls -t /backups/cosmopolis_*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm
          echo "[backup] next run in 24h"
          sleep 86400
        done

volumes:
  pgdata:
